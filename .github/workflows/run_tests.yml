name: Python Testing Pipeline

# 1. Trigger the workflow on every git push to any branch
on: [push]

jobs:
  run-pytest:
    # 2. Tell GitHub to spin up a fresh Ubuntu Linux virtual machine
    runs-on: ubuntu-latest

    steps:
    # 3. Download (checkout) repository code onto the virtual machine
    - name: Check out repository code
      uses: actions/checkout@v4

    # 4. Install Python 3 and higher on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 5. Install imported libraries (SymPy, NumPy, Matplotlib, Pytest)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov numpy sympy matplotlib 

    # 6. Run tests
    - name: Run Pytest
      run: |
        pytest --cov=calculator --cov-fail-under=80 -v