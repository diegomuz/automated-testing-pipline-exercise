name: Python Testing Pipeline

#Trigger the workflow on every git push to any branch
on: [push]

jobs:
  run-pytest:
    # Tell GitHub to start a fresh Ubuntu Linux virtual machine
    runs-on: ubuntu-latest

    # set up the python versions to be used
    strategy:
      matrix:
    
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    # Download (checkout) repository code onto the virtual machine
    - name: Check out repository code
      uses: actions/checkout@v4

    # Install Python 3 and higher on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{matrix.python-version}}

    # cache libraries to not have to install them every time the workflow runs
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
    

    # Install imported libraries (SymPy, NumPy, Matplotlib, Pytest)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov numpy sympy matplotlib 

    # Run tests
    - name: Run Pytest
      run: |
        pytest --cov=src.diego_m_calculator_pkg.calculator --cov-fail-under=80 --cov-report=html -v
    
    # Upload HTML coverage report as an artifact
    - name: Upload HTML Coverage Report Artifact
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: python-coverage-report-${{ matrix.python-version }}
        path: htmlcov/

    # Compile the package on Python 3.14
    - name: Build package distributions
      if: matrix.python-version == '3.14'  
      run: |
        pip install build
        python -m build

    # Upload the artifact Python 3.14
    - name: Upload Built Package Artifact
      if: matrix.python-version == '3.14' 
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions  
        path: dist/
        retention-days: 5


